name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-test.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt

      - name: Install package in editable mode (no deps)
        run: |
          python -m pip install --no-deps -e .

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short || true

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short || true

      - name: Upload coverage
        if: success()
        run: |
          pytest tests/ --cov=fusionchmingest --cov-report=xml --cov-report=html || true

  lint:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: |
          python -m pip install ruff black

      - name: Run ruff
        run: |
          ruff check fusionchmingest/ || true

      - name: Run black
        run: |
          black --check fusionchmingest/ || true
